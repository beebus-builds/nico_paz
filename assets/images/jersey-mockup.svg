<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <defs>
    <linearGradient id="jersey-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8FC5F0"/>
      <stop offset="100%" stop-color="#75AADB"/>
    </linearGradient>
  </defs>
  <!-- Jersey body -->
  <path d="M 100 80 L 60 110 L 80 160 L 110 145 L 110 460 L 290 460 L 290 145 L 320 160 L 340 110 L 300 80 L 250 70 Q 200 100 150 70 Z" fill="url(#jersey-grad)" stroke="#0A0E1A" stroke-width="2"/>
  <!-- Center stripe (white, Argentine flag) -->
  <path d="M 180 70 L 180 460 L 220 460 L 220 70 Q 200 90 180 70 Z" fill="#FFFFFF"/>
  <!-- V-neck -->
  <path d="M 170 70 L 200 120 L 230 70 Q 200 90 170 70 Z" fill="#0A0E1A" opacity="0.3"/>
  <!-- Number 10 -->
  <text x="200" y="290" font-family="Anton, Impact, sans-serif" font-size="100" font-weight="400" fill="#0A0E1A" text-anchor="middle" letter-spacing="-3">10</text>
  <!-- Name -->
  <text x="200" y="225" font-family="Anton, Impact, sans-serif" font-size="28" font-weight="400" fill="#0A0E1A" text-anchor="middle" letter-spacing="3">PAZ</text>
  <!-- Sun of May on chest (left side) -->
  <g transform="translate(150 200)">
    <circle r="13" fill="#F6B40E"/>
    <g stroke="#F6B40E" stroke-width="1.5" stroke-linecap="round">
      <line x1="0" y1="-18" x2="0" y2="-15"/>
      <line x1="0" y1="15" x2="0" y2="18"/>
      <line x1="-18" y1="0" x2="-15" y2="0"/>
      <line x1="15" y1="0" x2="18" y2="0"/>
      <line x1="-12.7" y1="-12.7" x2="-10.6" y2="-10.6"/>
      <line x1="10.6" y1="10.6" x2="12.7" y2="12.7"/>
      <line x1="-12.7" y1="12.7" x2="-10.6" y2="10.6"/>
      <line x1="10.6" y1="-10.6" x2="12.7" y2="-12.7"/>
    </g>
    <circle cx="-3" cy="-1" r="1.2" fill="#0A0E1A"/>
    <circle cx="3" cy="-1" r="1.2" fill="#0A0E1A"/>
  </g>
  <!-- Stripes on sleeves -->
  <path d="M 60 110 L 80 160 L 75 160 L 55 115 Z" fill="#FFFFFF"/>
  <path d="M 340 110 L 320 160 L 325 160 L 345 115 Z" fill="#FFFFFF"/>
</svg>
