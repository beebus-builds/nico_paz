<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240">
  <defs>
    <linearGradient id="crest-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8FC5F0"/>
      <stop offset="100%" stop-color="#3672B0"/>
    </linearGradient>
  </defs>
  <!-- Shield body -->
  <path d="M 100 10 L 190 50 L 190 130 Q 190 200 100 230 Q 10 200 10 130 L 10 50 Z" fill="url(#crest-grad)" stroke="#0A0E1A" stroke-width="3"/>
  <!-- Inner border -->
  <path d="M 100 25 L 175 58 L 175 130 Q 175 190 100 215 Q 25 190 25 130 L 25 58 Z" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.5"/>
  <!-- White middle stripe (Argentine flag) -->
  <rect x="30" y="115" width="140" height="40" fill="#FFFFFF" opacity="0.95"/>
  <!-- Sun of May in center of white stripe -->
  <g transform="translate(100 135)">
    <circle r="13" fill="#F6B40E"/>
    <g stroke="#F6B40E" stroke-width="2" stroke-linecap="round">
      <line x1="0" y1="-18" x2="0" y2="-15"/>
      <line x1="0" y1="15" x2="0" y2="18"/>
      <line x1="-18" y1="0" x2="-15" y2="0"/>
      <line x1="15" y1="0" x2="18" y2="0"/>
      <line x1="-12.7" y1="-12.7" x2="-10.6" y2="-10.6"/>
      <line x1="10.6" y1="10.6" x2="12.7" y2="12.7"/>
      <line x1="-12.7" y1="12.7" x2="-10.6" y2="10.6"/>
      <line x1="10.6" y1="-10.6" x2="12.7" y2="-12.7"/>
    </g>
    <!-- Face of sun -->
    <circle r="3" cx="-3" cy="0" fill="#0A0E1A"/>
    <circle r="3" cx="3" cy="0" fill="#0A0E1A"/>
    <path d="M -4 3 Q 0 6 4 3" stroke="#0A0E1A" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>
  <!-- NP monogram top -->
  <text x="100" y="80" font-family="Anton, Impact, sans-serif" font-size="40" font-weight="400" fill="#FFFFFF" text-anchor="middle" letter-spacing="-2">NP</text>
  <!-- Number 10 bottom -->
  <text x="100" y="195" font-family="Anton, Impact, sans-serif" font-size="22" font-weight="400" fill="#F6B40E" text-anchor="middle" letter-spacing="3">N° 10</text>
  <!-- Stars top corners -->
  <text x="55" y="60" font-size="20" fill="#F6B40E" font-family="Arial">★</text>
  <text x="135" y="60" font-size="20" fill="#F6B40E" font-family="Arial">★</text>
</svg>
